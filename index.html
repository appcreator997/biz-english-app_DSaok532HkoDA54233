<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Business English Speaker Pro</title>
    
    <!-- iOS PWA settings -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BizEng Pro">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2904/2904841.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700&family=Noto+Sans+JP:wght@400;700&display=swap');
        
        :root {
            --primary: #2dd4bf;
            --bg-dark: #0f172a;
        }

        body {
            font-family: 'Urbanist', 'Noto Sans JP', sans-serif;
            background-color: var(--bg-dark);
            color: #f8fafc;
            margin: 0;
            overflow-x: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        #app {
            height: 100vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #2dd4bf 0%, #0d9488 100%);
            transition: all 0.3s ease;
        }

        .btn-primary:active { transform: scale(0.95); }

        .anime-image {
            border-radius: 16px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            object-fit: cover;
            width: 100%;
            height: 240px;
            background: #1e293b;
        }

        .timer-bar {
            height: 100%;
            background-color: var(--primary);
            width: 100%;
            transition: width 10s linear;
        }

        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .pos-badge {
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(45, 212, 191, 0.15);
            color: #2dd4bf;
            border: 1px solid rgba(45, 212, 191, 0.3);
            text-transform: uppercase;
            font-weight: 700;
        }

        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="app" class="max-w-md mx-auto flex flex-col gap-6">
        
        <!-- Header -->
        <header id="header" class="hidden flex justify-between items-center py-4 shrink-0">
            <h1 class="text-2xl font-bold text-teal-400">BizEng <span class="text-white font-light">Pro</span></h1>
            <div class="flex gap-4">
                <button onclick="switchTab('list')" class="text-slate-400 hover:text-white" title="一覧"><i class="fa-solid fa-list text-xl"></i></button>
                <button onclick="switchTab('add')" class="text-slate-400 hover:text-white" title="単語登録"><i class="fa-solid fa-plus text-xl"></i></button>
                <button onclick="logout()" class="text-slate-400 hover:text-white" title="ログアウト"><i class="fa-solid fa-right-from-bracket text-xl"></i></button>
                <button onclick="startTest()" class="btn-primary px-5 py-1.5 rounded-full text-sm font-bold text-slate-900 shadow-lg">TEST</button>
            </div>
        </header>

        <main id="main-content" class="flex-grow pb-safe overflow-hidden flex flex-col">
            
            <!-- Setup View -->
            <section id="tab-login" class="fade-in flex flex-col justify-center h-full">
                <div class="glass-card p-8 text-center">
                    <div class="mb-6"><i class="fa-solid fa-shield-halved text-5xl text-teal-400"></i></div>
                    <h2 class="text-2xl font-bold mb-6">App Setup</h2>
                    <div class="space-y-6">
                        <div class="text-left">
                            <label class="text-[10px] text-slate-500 ml-2 uppercase font-bold">1. 同期ID (デバイス間で共通)</label>
                            <input type="password" id="sync-id-input" placeholder="自分だけのキーワード" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-4 focus:outline-none focus:border-teal-400 text-white text-center">
                        </div>
                        <div class="text-left">
                            <label class="text-[10px] text-slate-500 ml-2 uppercase font-bold">2. Gemini API Key (Google AI Studio)</label>
                            <input type="password" id="api-key-input" placeholder="AIza..." class="w-full bg-slate-800 border border-slate-700 rounded-xl p-4 focus:outline-none focus:border-teal-400 text-white text-center">
                        </div>
                        <button onclick="saveAndLogin()" class="w-full btn-primary py-4 rounded-xl font-bold text-slate-900 text-lg shadow-xl mt-4">設定を保存して開始</button>
                        <p class="text-[10px] text-slate-500 mt-4 leading-relaxed">※APIキーはブラウザに保存され、GitHubに公開されることはありません。</p>
                    </div>
                </div>
            </section>

            <!-- Loading Overlay -->
            <div id="loading" class="hidden fixed inset-0 bg-slate-900/95 z-50 flex flex-col items-center justify-center text-center p-6 backdrop-blur-md">
                <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-teal-400 mb-6"></div>
                <p id="loading-status" class="text-teal-400 font-bold text-xl mb-2">Analyzing...</p>
                <p id="loading-sub" class="text-slate-400 text-sm">AIが教材を生成しています</p>
            </div>

            <!-- List View -->
            <section id="tab-list" class="hidden fade-in h-full overflow-y-auto pr-1">
                <div id="word-container" class="grid gap-6 pb-24"></div>
            </section>

            <!-- Add View -->
            <section id="tab-add" class="hidden fade-in">
                <div class="glass-card p-6">
                    <h2 class="text-xl font-bold mb-6">英単語の追加</h2>
                    <input type="text" id="input-word" placeholder="例: Leverage" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-4 focus:outline-none focus:border-teal-400 text-white text-lg mb-6">
                    <button id="add-submit-btn" onclick="processNewWord()" class="w-full btn-primary py-4 rounded-xl font-bold text-slate-900 text-lg shadow-xl">教材を生成 & 保存</button>
                </div>
            </section>

            <!-- Test View -->
            <section id="tab-test" class="hidden fade-in flex-grow flex flex-col">
                <div class="glass-card p-6 text-center flex flex-col flex-grow min-h-[500px]">
                    <div class="flex justify-between items-center mb-6">
                        <span id="test-progress" class="text-xs font-mono text-slate-500">1/5</span>
                        <button onclick="stopTest()" class="text-slate-500"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                    <h3 id="test-jp-text" class="text-xl font-bold mb-8 min-h-[5rem] flex items-center justify-center leading-relaxed px-2"></h3>
                    <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden mb-8"><div id="test-timer-bar" class="timer-bar"></div></div>
                    <div id="test-answer-area" class="hidden fade-in flex-grow">
                        <img id="test-image" src="" class="anime-image mb-4">
                        <div class="flex items-center justify-center gap-2 mb-1">
                            <p id="test-en-text" class="text-xl font-bold text-teal-400"></p>
                            <span id="test-pos" class="pos-badge"></span>
                        </div>
                        <button onclick="playSpeech('test-en-text')" class="text-teal-400 text-4xl my-2 active:opacity-50"><i class="fa-solid fa-circle-play"></i></button>
                    </div>
                    <div class="mt-auto flex gap-4 pt-4"><button id="btn-show-answer" onclick="revealAnswer()" class="flex-grow btn-primary py-4 rounded-xl font-bold text-slate-900 shadow-lg">答えを見る</button><button id="btn-next-test" onclick="nextQuestion()" class="hidden flex-grow btn-primary py-4 rounded-xl font-bold text-slate-900 shadow-lg">Next</button></div>
                </div>
            </section>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Config (Public info)
        const firebaseConfig = {
            apiKey: "AIzaSyB7EQtiD4SLni8RgI63XtADxbEBRetfo1s",
            authDomain: "biz-english-app.firebaseapp.com",
            projectId: "biz-english-app",
            storageBucket: "biz-english-app.firebasestorage.app",
            messagingSenderId: "1096252459",
            appId: "1:1096252459:web:e003ec9aa9c40d63517e6e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appIdPrefix = "biz-eng-pro-v2.5-stable"; 

        let syncId = localStorage.getItem('BIZENG_SYNC_ID_V25');
        let geminiApiKey = localStorage.getItem('BIZENG_GEMINI_KEY_V25');
        let words = [];
        let unsubscribeSync = null;
        let isSpeaking = false;
        let currentTestIndex = 0;
        let testQueue = [];
        let testTimer = null;

        // --- AUTH & SETUP ---
        window.saveAndLogin = () => {
            const sid = document.getElementById('sync-id-input').value.trim();
            const key = document.getElementById('api-key-input').value.trim();
            if (!sid || !key) return alert("IDとAPIキーを入力してください。");
            
            localStorage.setItem('BIZENG_SYNC_ID_V25', sid);
            localStorage.setItem('BIZENG_GEMINI_KEY_V25', key);
            syncId = sid;
            geminiApiKey = key;
            checkAuthState();
        };

        window.logout = () => {
            if (confirm("同期設定を解除しますか？")) {
                localStorage.removeItem('BIZENG_SYNC_ID_V25');
                localStorage.removeItem('BIZENG_GEMINI_KEY_V25');
                location.reload();
            }
        };

        const checkAuthState = async () => {
            if (!syncId || !geminiApiKey) return switchTab('login');
            showLoading(true, "Connecting...");
            try {
                await signInAnonymously(auth);
                setupSync();
                document.getElementById('header').classList.remove('hidden');
                switchTab('list');
            } catch (e) { alert("Auth Error: " + e.message); showLoading(false); }
        };

        const setupSync = () => {
            const wordsCol = collection(db, 'artifacts', appIdPrefix, 'users', syncId, 'words');
            if (unsubscribeSync) unsubscribeSync();
            unsubscribeSync = onSnapshot(wordsCol, (snapshot) => {
                const fetched = [];
                snapshot.forEach(doc => fetched.push({ id: doc.id, ...doc.data() }));
                words = fetched.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
                renderWordList();
                showLoading(false);
            }, () => showLoading(false));
        };

        // --- AI LOGIC (Gemini 2.5 Flash / Imagen 3.0) ---
        async function callGemini(model, payload) {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${geminiApiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error?.message || "Gemini API Error");
            return data;
        }

        async function callImagen(prompt) {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-3.0-generate-001:predict?key=${geminiApiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    instances: { prompt: prompt }, 
                    parameters: { sampleCount: 1 } 
                })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error?.message || "Imagen API Error");
            
            if (data.predictions && data.predictions[0] && data.predictions[0].bytesBase64Encoded) {
                return `data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`;
            }
            throw new Error("No image data received");
        }

        window.processNewWord = async () => {
            const wordInput = document.getElementById('input-word').value.trim();
            if (!wordInput || !syncId) return;
            showLoading(true, "Gemini 2.5 Analyzing...", "次世代AIが文脈を解析中");
            
            try {
                // 1. Text Analysis (Gemini 2.5 Flash)
                const prompt = `英単語「${wordInput}」を分析し、以下のJSON形式のみで出力してください。和訳も含めてください。Markdown記法は禁止。
"meaning" フィールドは、必ず以下の箇条書き形式（改行を含む）にしてください。
・意味：[日本語での主な意味]
・場面：[具体的なビジネス使用シーン]

JSON形式:
{ "word": "${wordInput}", "part_of_speech": "品詞", "phonetic": "発音記号", "meaning": "・意味：〜\\n・場面：〜", "examples": [{"en": "例文1", "jp": "和訳1"}, {"en": "例文2", "jp": "和訳2"}], "visual_description": "Modern office business anime scene description" }`;
                
                // Updated to gemini-2.5-flash
                const textData = await callGemini('gemini-2.5-flash', { contents: [{ parts: [{ text: prompt }] }] });
                const raw = textData.candidates[0].content.parts[0].text;
                const jsonMatch = raw.match(/\{[\s\S]*\}/);
                if (!jsonMatch) throw new Error("JSON形式の解析に失敗しました");
                const wordData = JSON.parse(jsonMatch[0]);

                // 2. Image Generation (Imagen 3.0)
                showLoading(true, "Designing Visual...", "記憶を助ける画像を生成中");
                let imageUrl = "";
                try {
                    imageUrl = await callImagen(`Professional corporate anime art style, high quality digital illustration. ${wordData.visual_description}`);
                } catch (e) { 
                    console.error("Image Fail:", e);
                    imageUrl = `https://via.placeholder.com/400x300/1e293b/f8fafc?text=${encodeURIComponent(wordData.word)}`; 
                }
                
                wordData.imageUrl = imageUrl;
                wordData.createdAt = Date.now();
                wordData.reviewCount = 0;

                // 3. Save
                await setDoc(doc(db, 'artifacts', appIdPrefix, 'users', syncId, 'words', `w_${Date.now()}`), wordData);
                
                switchTab('list');
                document.getElementById('input-word').value = '';
            } catch (e) { 
                console.error("Error:", e);
                alert("生成エラー: " + e.message + "\nGemini 2.5 の利用権限やAPIキーを確認してください。"); 
            } finally { 
                showLoading(false); 
            }
        };

        // --- UI UTILS ---
        window.switchTab = (tab) => {
            ['login', 'list', 'add', 'test'].forEach(id => {
                const el = document.getElementById(`tab-${id}`);
                if (el) el.classList.add('hidden');
            });
            const target = document.getElementById(`tab-${tab}`);
            if (target) target.classList.remove('hidden');
        };

        window.showLoading = (show, status = "", sub = "") => {
            const overlay = document.getElementById('loading');
            if (status) document.getElementById('loading-status').innerText = status;
            if (sub) document.getElementById('loading-sub').innerText = sub;
            overlay.classList.toggle('hidden', !show);
        };

        window.renderWordList = () => {
            const container = document.getElementById('word-container');
            if (words.length === 0) { 
                container.innerHTML = `<div class="text-center py-24 text-slate-500">単語がありません。<br>「＋」から追加してください。</div>`; 
                return; 
            }
            container.innerHTML = words.map(w => `
                <div class="glass-card overflow-hidden fade-in mb-6">
                    <img src="${w.imageUrl}" class="w-full h-52 object-cover opacity-80" onerror="this.src='https://via.placeholder.com/400x300/1e293b/f8fafc?text=${encodeURIComponent(w.word)}'">
                    <div class="p-5 -mt-12 relative z-10">
                        <div class="bg-slate-900/95 rounded-2xl p-5 border border-white/10 shadow-2xl">
                            <div class="flex justify-between items-start mb-3">
                                <div>
                                    <div class="flex items-center gap-2 mb-1"><h3 class="text-2xl font-bold text-teal-400">${w.word}</h3><span class="pos-badge">${w.part_of_speech}</span></div>
                                    <p class="text-xs font-mono text-slate-500">${w.phonetic} | Review: ${w.reviewCount}</p>
                                </div>
                                <button onclick="playText('${w.word.replace(/'/g, "\\'")}')" class="text-teal-400 text-3xl active:scale-90 transition-transform"><i class="fa-solid fa-circle-play"></i></button>
                            </div>
                            <div class="text-white font-medium mb-4 border-b border-slate-700 pb-2 whitespace-pre-wrap leading-relaxed">${w.meaning}</div>
                            ${w.examples.map(ex => `<div class="bg-slate-800/50 p-3 rounded-xl border-l-4 border-teal-400 mb-2">
                                <div class="flex justify-between items-start">
                                    <p class="text-xs text-teal-50 font-medium leading-relaxed flex-grow">${ex.en}</p>
                                    <button onclick="playText(\`${ex.en.replace(/'/g, "\\'")}\`)" class="text-slate-500 hover:text-teal-400 pl-2 active:scale-90 transition-transform"><i class="fa-solid fa-play text-[10px]"></i></button>
                                </div>
                                <p class="text-[10px] text-slate-400 mt-1">💡 ${ex.jp}</p>
                            </div>`).join('')}
                        </div>
                    </div>
                </div>
            `).join('');
        };

        // --- TEST & AUDIO ---
        window.startTest = () => {
            if (words.length === 0) return alert("テストできる単語がありません");
            testQueue = [...words].sort(() => 0.5 - Math.random()).slice(0, 5).map(w => ({ ...w, targetEx: w.examples[Math.floor(Math.random()*w.examples.length)] }));
            currentTestIndex = 0; switchTab('test'); showQuestion();
        };

        window.stopTest = () => { clearTimeout(testTimer); switchTab('list'); };

        function showQuestion() {
            const q = testQueue[currentTestIndex];
            document.getElementById('test-progress').innerText = `${currentTestIndex+1}/5`;
            document.getElementById('test-jp-text').innerText = q.targetEx.jp;
            document.getElementById('test-en-text').innerText = q.targetEx.en;
            document.getElementById('test-image').src = q.imageUrl;
            document.getElementById('test-pos').innerText = q.part_of_speech;
            document.getElementById('test-answer-area').classList.add('hidden');
            document.getElementById('btn-show-answer').classList.remove('hidden');
            document.getElementById('btn-next-test').classList.add('hidden');
            const bar = document.getElementById('test-timer-bar');
            bar.style.transition = 'none'; bar.style.width = '100%';
            setTimeout(() => { bar.style.transition = 'width 10s linear'; bar.style.width = '0%'; }, 50);
            clearTimeout(testTimer); testTimer = setTimeout(revealAnswer, 10000);
        }

        window.revealAnswer = async () => {
            clearTimeout(testTimer);
            const q = testQueue[currentTestIndex];
            try { 
                const docRef = doc(db, 'artifacts', appIdPrefix, 'users', syncId, 'words', q.id);
                await updateDoc(docRef, { reviewCount: (q.reviewCount || 0) + 1 }); 
            } catch (e) {}
            document.getElementById('test-answer-area').classList.remove('hidden');
            document.getElementById('btn-show-answer').classList.add('hidden');
            document.getElementById('btn-next-test').classList.remove('hidden');
            playText(q.targetEx.en);
        };

        window.nextQuestion = () => { currentTestIndex++; if (currentTestIndex < 5 && currentTestIndex < words.length) showQuestion(); else switchTab('list'); };

        window.playText = async (txt) => {
            if (isSpeaking) return; isSpeaking = true;
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${geminiApiKey}`, {
                    method: 'POST',
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: txt }] }], 
                        generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Puck" } } } } 
                    })
                });
                const data = await res.json();
                const pcm = data.candidates[0].content.parts[0].inlineData.data;
                const audio = new Audio(URL.createObjectURL(new Blob([createWavHeader(atob(pcm).length, 24000), new Uint8Array([...atob(pcm)].map(c => c.charCodeAt(0)))], { type: 'audio/wav' })));
                audio.onended = () => isSpeaking = false; audio.play();
            } catch (e) { isSpeaking = false; }
        };

        window.playSpeech = (id) => playText(document.getElementById(id).innerText);
        
        function createWavHeader(l, r) {
            const b = new ArrayBuffer(44); const v = new DataView(b);
            const s = (o, str) => { for (let i = 0; i < str.length; i++) v.setUint8(o + i, str.charCodeAt(i)); };
            s(0, 'RIFF'); v.setUint32(4, 36 + l, true); s(8, 'WAVE'); s(12, 'fmt ');
            v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, 1, true);
            v.setUint32(24, r, true); v.setUint32(28, r * 2, true);
            v.setUint16(32, 2, true); v.setUint16(34, 16, true); s(36, 'data'); v.setUint32(40, l, true);
            return b;
        }

        window.onload = checkAuthState;
    </script>
</body>
</html>

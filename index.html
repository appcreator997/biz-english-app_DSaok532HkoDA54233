<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Business English Speaker Pro</title>
    
    <!-- iOS用のアプリ設定 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BizEng Pro">
    <!-- アイコン設定（本来は画像が必要ですが、設定のみ記述） -->
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2904/2904841.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700&family=Noto+Sans+JP:wght@400;700&display=swap');
        
        :root {
            --primary: #2dd4bf;
            --bg-dark: #0f172a;
        }

        body {
            font-family: 'Urbanist', 'Noto Sans JP', sans-serif;
            background-color: var(--bg-dark);
            color: #f8fafc;
            margin: 0;
            overflow-x: hidden;
            /* iOSでのバウンススクロール防止 */
            position: fixed;
            width: 100%;
            height: 100%;
        }

        #app {
            height: 100vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #2dd4bf 0%, #0d9488 100%);
            transition: all 0.3s ease;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(45, 212, 191, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .anime-image {
            border-radius: 16px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            object-fit: cover;
            width: 100%;
            height: 240px;
            background: #1e293b;
        }

        .timer-bar {
            height: 100%;
            background-color: var(--primary);
            width: 100%;
            transition: width 10s linear;
        }

        .speaking .audio-btn {
            opacity: 0.5;
            pointer-events: none;
        }

        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .pos-badge {
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(45, 212, 191, 0.15);
            color: #2dd4bf;
            border: 1px solid rgba(45, 212, 191, 0.3);
            text-transform: uppercase;
            font-weight: 700;
        }

        .review-count-badge {
            font-size: 0.7rem;
            color: #94a3b8;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* モバイル用UI調整：下部余白 */
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="app" class="max-w-md mx-auto flex flex-col gap-6">
        
        <!-- Header -->
        <header class="flex justify-between items-center py-4 shrink-0">
            <h1 class="text-2xl font-bold text-teal-400">BizEnglish <span class="text-white font-light">Pro</span></h1>
            <div class="flex gap-3">
                <button onclick="switchTab('list')" class="text-slate-400 hover:text-white" title="一覧"><i class="fa-solid fa-list text-xl"></i></button>
                <button onclick="switchTab('add')" class="text-slate-400 hover:text-white" title="追加"><i class="fa-solid fa-plus text-xl"></i></button>
                <button onclick="startTest()" class="btn-primary px-4 py-1 rounded-full text-sm font-bold text-slate-900">TEST</button>
            </div>
        </header>

        <!-- Main Content Area -->
        <main id="main-content" class="flex-grow pb-safe">
            <!-- Loading Overlay -->
            <div id="loading" class="hidden fixed inset-0 bg-slate-900/80 z-50 flex flex-col items-center justify-center text-center p-6">
                <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-teal-400 mb-4"></div>
                <p id="loading-status" class="text-teal-400 font-bold text-lg">AIが生成中...</p>
                <p class="text-slate-400 text-sm mt-2">例文とイラストを2セット分作成しています</p>
            </div>

            <!-- Tab: List -->
            <section id="tab-list" class="fade-in">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-book-bookmark text-teal-400"></i>
                    ストックしたボキャブラリー
                </h2>
                <div id="word-container" class="grid gap-6"></div>
            </section>

            <!-- Tab: Add Word -->
            <section id="tab-add" class="hidden fade-in">
                <div class="glass-card p-6">
                    <h2 class="text-xl font-bold mb-6">新単語を追加</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm text-slate-400 mb-1">英単語 / 英熟語</label>
                            <input type="text" id="input-word" placeholder="例: Facilitate" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 focus:outline-none focus:border-teal-400 text-white">
                        </div>
                        <button id="add-submit-btn" onclick="processNewWord()" class="w-full btn-primary py-4 rounded-xl font-bold text-slate-900 mt-4">
                            AIで詳細と画像を生成
                        </button>
                    </div>
                </div>
            </section>

            <!-- Tab: Test Mode -->
            <section id="tab-test" class="hidden fade-in">
                <div class="glass-card p-6 text-center flex flex-col min-h-[500px]">
                    <div class="flex justify-between items-center mb-6">
                        <span id="test-progress" class="text-xs text-slate-500 font-mono">1 / 5</span>
                        <button onclick="stopTest()" class="text-slate-500 hover:text-white"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                    
                    <div id="test-question-area">
                        <p class="text-slate-400 text-xs mb-2 font-bold uppercase tracking-wider">Shadowing Challenge (10s)</p>
                        <h3 id="test-jp-text" class="text-xl font-bold mb-8 min-h-[4rem] flex items-center justify-center px-2"></h3>
                        
                        <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden mb-8">
                            <div id="test-timer-bar" class="timer-bar"></div>
                        </div>

                        <div id="test-answer-area" class="hidden fade-in">
                            <div class="anime-image-container mb-6">
                                <img id="test-image" src="" alt="anime-illustration" class="anime-image">
                            </div>
                            <div class="mb-4">
                                <div class="flex items-center justify-center gap-2 mb-1">
                                    <p id="test-en-text" class="text-lg font-bold text-teal-400 leading-tight"></p>
                                    <span id="test-pos" class="pos-badge"></span>
                                </div>
                                <p id="test-phonetic" class="text-sm text-slate-500 font-mono"></p>
                            </div>
                            <button id="test-audio-btn" onclick="playSpeech('test-en-text')" class="audio-btn bg-teal-400/10 hover:bg-teal-400/20 w-12 h-12 rounded-full mb-4">
                                <i class="fa-solid fa-volume-high text-teal-400"></i>
                            </button>
                        </div>
                    </div>

                    <div class="mt-auto flex gap-4 pt-4">
                        <button id="btn-show-answer" onclick="revealAnswer()" class="flex-grow btn-primary py-4 rounded-xl font-bold text-slate-900">答えを見る</button>
                        <button id="btn-next-test" onclick="nextQuestion()" class="hidden flex-grow btn-primary py-4 rounded-xl font-bold text-slate-900">次の問題へ</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script type="module">
        const apiKey = "";
        
        let words = JSON.parse(localStorage.getItem('biz_words') || '[]');
        let currentTestIndex = 0;
        let testQueue = [];
        let testTimer = null;
        let isSpeaking = false;

        async function fetchWithRetry(url, options, maxRetries = 5) {
            for (let i = 0; i <= maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (response.ok) return response;
                    const errorData = await response.json().catch(() => ({}));
                    if (i === maxRetries) throw new Error(errorData.error?.message || `HTTP error! status: ${response.status}`);
                } catch (err) {
                    if (i === maxRetries) throw err;
                }
                const delay = Math.pow(2, i) * 1000;
                await new Promise(res => setTimeout(res, delay));
            }
        }

        window.processNewWord = async () => {
            const wordInput = document.getElementById('input-word').value.trim();
            if (!wordInput) return;

            showLoading(true, "テキストを生成中...");

            try {
                const prompt = `以下のビジネス英単語/熟語の詳細を日本語で生成し、JSON形式で返してください。
                単語: ${wordInput}
                JSON形式: { 
                    "word": "${wordInput}", 
                    "part_of_speech": "品詞",
                    "phonetic": "発音記号", 
                    "meaning": "意味", 
                    "synonyms": "類語", 
                    "examples": [
                        {"en": "例文1", "jp": "和訳1"},
                        {"en": "例文2", "jp": "和訳2"}
                    ],
                    "visual_description": "A high-quality business anime scene: [English description]"
                }`;

                const textResponse = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                
                const textResult = await textResponse.json();
                const rawJson = textResult.candidates[0].content.parts[0].text;
                let wordData = JSON.parse(rawJson.replace(/```json/g, '').replace(/```/g, '').trim());

                showLoading(true, "イラストをデザイン中...");
                const imagePrompt = `Modern professional corporate anime style. ${wordData.visual_description}. No text.`;
                const imageResponse = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ instances: { prompt: imagePrompt }, parameters: { sampleCount: 1 } })
                });
                
                const imageData = await imageResponse.json();
                wordData.imageUrl = `data:image/png;base64,${imageData.predictions[0].bytesBase64Encoded}`;
                wordData.id = Date.now();
                wordData.reviewCount = 0;

                words.unshift(wordData);
                localStorage.setItem('biz_words', JSON.stringify(words));
                
                renderWordList();
                switchTab('list');
                document.getElementById('input-word').value = '';

            } catch (error) {
                console.error(error);
                alert("エラーが発生しました: " + error.message);
            } finally {
                showLoading(false);
            }
        };

        window.switchTab = (tab) => {
            const tabs = ['list', 'add', 'test'];
            tabs.forEach(t => document.getElementById(`tab-${t}`).classList.add('hidden'));
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
        };

        window.showLoading = (show, message = "AIが生成中...") => {
            const overlay = document.getElementById('loading');
            document.getElementById('loading-status').innerText = message;
            overlay.classList.toggle('hidden', !show);
        };

        window.renderWordList = () => {
            const container = document.getElementById('word-container');
            if (words.length === 0) {
                container.innerHTML = `<div class="text-center py-12 text-slate-500">単語を追加してください</div>`;
                return;
            }

            container.innerHTML = words.map(w => {
                const exampleHtml = w.examples.map(ex => `
                    <div class="bg-slate-800/50 p-4 rounded-xl border-l-4 border-teal-400 mb-3 last:mb-0">
                        <div class="flex justify-between items-start mb-1">
                            <p class="text-sm text-teal-50 font-medium leading-relaxed pr-6">${ex.en}</p>
                            <button onclick="playText(\`${ex.en.replace(/'/g, "\\'")}\`)" class="audio-btn text-slate-400 hover:text-white">
                                <i class="fa-solid fa-play text-xs"></i>
                            </button>
                        </div>
                        <p class="text-xs text-slate-400 mt-2">💡 ${ex.jp}</p>
                    </div>
                `).join('');

                return `
                    <div class="glass-card overflow-hidden fade-in">
                        <img src="${w.imageUrl}" class="w-full h-52 object-cover opacity-70">
                        <div class="p-5 -mt-12 relative z-10">
                            <div class="bg-slate-900/95 rounded-2xl p-5 border border-white/10 shadow-2xl">
                                <div class="flex justify-between items-start mb-2">
                                    <div class="flex-grow">
                                        <div class="flex items-center gap-2 mb-1">
                                            <h3 class="text-2xl font-bold text-teal-400">${w.word}</h3>
                                            <span class="pos-badge">${w.part_of_speech || 'POS'}</span>
                                        </div>
                                        <div class="flex items-center gap-3">
                                            <p class="text-sm font-mono text-slate-500">${w.phonetic}</p>
                                            <span class="review-count-badge">
                                                <i class="fa-solid fa-rotate-right"></i> 復習: ${w.reviewCount || 0}回
                                            </span>
                                        </div>
                                    </div>
                                    <button onclick="playText('${w.word.replace(/'/g, "\\'")}')" class="audio-btn text-teal-400 p-2 hover:bg-teal-400/10 rounded-full">
                                        <i class="fa-solid fa-volume-high text-xl"></i>
                                    </button>
                                </div>
                                <p class="text-white font-bold mb-4 border-b border-slate-700 pb-2">${w.meaning}</p>
                                <div class="space-y-1">
                                    ${exampleHtml}
                                </div>
                                <p class="text-[10px] text-slate-600 mt-4 text-right">類語: ${w.synonyms}</p>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        };

        window.startTest = () => {
            if (words.length === 0) return;
            testQueue = [...words].sort(() => 0.5 - Math.random()).slice(0, 5).map(w => {
                const randomExample = w.examples[Math.floor(Math.random() * w.examples.length)];
                return { ...w, targetExample: randomExample };
            });
            currentTestIndex = 0;
            switchTab('test');
            showQuestion();
        };

        window.stopTest = () => {
            clearTimeout(testTimer);
            switchTab('list');
        };

        function showQuestion() {
            const q = testQueue[currentTestIndex];
            document.getElementById('test-progress').innerText = `${currentTestIndex + 1} / ${testQueue.length}`;
            document.getElementById('test-jp-text').innerText = q.targetExample.jp;
            document.getElementById('test-en-text').innerText = q.targetExample.en;
            document.getElementById('test-phonetic').innerText = q.phonetic;
            document.getElementById('test-image').src = q.imageUrl;
            document.getElementById('test-pos').innerText = q.part_of_speech || '';
            
            document.getElementById('test-answer-area').classList.add('hidden');
            document.getElementById('btn-show-answer').classList.remove('hidden');
            document.getElementById('btn-next-test').classList.add('hidden');
            
            const bar = document.getElementById('test-timer-bar');
            bar.style.transition = 'none';
            bar.style.width = '100%';
            
            clearTimeout(testTimer);
            setTimeout(() => {
                bar.style.transition = 'width 10s linear';
                bar.style.width = '0%';
                testTimer = setTimeout(() => {
                    if (!document.getElementById('test-answer-area').classList.contains('hidden')) return;
                    revealAnswer();
                }, 10000);
            }, 50);
        }

        window.revealAnswer = () => {
            clearTimeout(testTimer);
            const q = testQueue[currentTestIndex];
            const wordIdx = words.findIndex(w => w.id === q.id);
            if (wordIdx !== -1) {
                words[wordIdx].reviewCount = (words[wordIdx].reviewCount || 0) + 1;
                localStorage.setItem('biz_words', JSON.stringify(words));
                renderWordList();
            }
            document.getElementById('test-answer-area').classList.remove('hidden');
            document.getElementById('btn-show-answer').classList.add('hidden');
            document.getElementById('btn-next-test').classList.remove('hidden');
            document.getElementById('test-timer-bar').style.width = '0%';
            playSpeech('test-en-text');
        };

        window.nextQuestion = () => {
            currentTestIndex++;
            if (currentTestIndex < testQueue.length) {
                showQuestion();
            } else {
                switchTab('list');
            }
        };

        window.playText = async (text) => {
            if (isSpeaking) return;
            isSpeaking = true;
            document.body.classList.add('speaking');
            const payload = {
                contents: [{ parts: [{ text: `Professional business tone: ${text}` }] }],
                generationConfig: { 
                    responseModalities: ["AUDIO"],
                    speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Puck" } } } 
                }
            };
            try {
                const response = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                const pcmData = data.candidates[0].content.parts[0].inlineData.data;
                playWavFromPcm(pcmData);
            } catch (e) { 
                console.error(e); 
                isSpeaking = false;
                document.body.classList.remove('speaking');
            }
        };

        window.playSpeech = (id) => {
            const text = document.getElementById(id).innerText;
            playText(text);
        };

        function playWavFromPcm(base64Pcm) {
            const binaryString = atob(base64Pcm);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) bytes[i] = binaryString.charCodeAt(i);
            const wavHeader = createWavHeader(len, 24000);
            const blob = new Blob([wavHeader, bytes], { type: 'audio/wav' });
            const url = URL.createObjectURL(blob);
            const audio = new Audio(url);
            audio.onended = () => { isSpeaking = false; document.body.classList.remove('speaking'); };
            audio.onerror = () => { isSpeaking = false; document.body.classList.remove('speaking'); };
            audio.play();
        }

        function createWavHeader(dataLength, sampleRate) {
            const header = new ArrayBuffer(44);
            const view = new DataView(header);
            const writeString = (offset, string) => {
                for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
            };
            writeString(0, 'RIFF');
            view.setUint32(4, 36 + dataLength, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(36, 'data');
            view.setUint32(40, dataLength, true);
            return header;
        }

        window.onload = () => { renderWordList(); };
    </script>
</body>
</html>

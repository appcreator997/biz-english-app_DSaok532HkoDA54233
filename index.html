<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Business English Speaker Pro</title>
    
    <!-- iOS PWA settings -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BizEng Pro">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2904/2904841.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700&family=Noto+Sans+JP:wght@400;700&display=swap');
        
        :root {
            --primary: #2dd4bf;
            --bg-dark: #0f172a;
        }

        body {
            font-family: 'Urbanist', 'Noto Sans JP', sans-serif;
            background-color: var(--bg-dark);
            color: #f8fafc;
            margin: 0;
            overflow-x: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        #app {
            height: 100vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #2dd4bf 0%, #0d9488 100%);
            transition: all 0.3s ease;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(45, 212, 191, 0.4);
        }

        .anime-image {
            border-radius: 16px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            object-fit: cover;
            width: 100%;
            height: 240px;
            background: #1e293b;
        }

        .timer-bar {
            height: 100%;
            background-color: var(--primary);
            width: 100%;
            transition: width 10s linear;
        }

        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .pos-badge {
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(45, 212, 191, 0.15);
            color: #2dd4bf;
            border: 1px solid rgba(45, 212, 191, 0.3);
            text-transform: uppercase;
            font-weight: 700;
        }

        .review-count-badge {
            font-size: 0.7rem;
            color: #94a3b8;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="app" class="max-w-md mx-auto flex flex-col gap-6">
        
        <!-- Header -->
        <header id="header" class="hidden flex justify-between items-center py-4 shrink-0">
            <h1 class="text-2xl font-bold text-teal-400">BizEnglish <span class="text-white font-light">Pro</span></h1>
            <div class="flex gap-3">
                <div id="sync-status" class="text-[10px] text-slate-500 self-center mr-2"></div>
                <button onclick="switchTab('list')" class="text-slate-400 hover:text-white" title="一覧"><i class="fa-solid fa-list text-xl"></i></button>
                <button onclick="switchTab('add')" class="text-slate-400 hover:text-white" title="単語登録"><i class="fa-solid fa-plus text-xl"></i></button>
                <button onclick="logout()" class="text-slate-400 hover:text-white" title="ログアウト"><i class="fa-solid fa-right-from-bracket text-xl"></i></button>
                <button onclick="startTest()" class="btn-primary px-4 py-1 rounded-full text-sm font-bold text-slate-900 shadow-lg">TEST</button>
            </div>
        </header>

        <main id="main-content" class="flex-grow pb-safe overflow-hidden flex flex-col">
            
            <!-- Login View -->
            <section id="tab-login" class="fade-in flex flex-col justify-center h-full">
                <div class="glass-card p-8 text-center">
                    <div class="mb-6"><i class="fa-solid fa-cloud-bolt text-5xl text-teal-400"></i></div>
                    <h2 class="text-2xl font-bold mb-2">Sync Settings</h2>
                    <p class="text-sm text-slate-400 mb-8">同期IDを入力して、クラウドに接続します。</p>
                    <div class="space-y-4">
                        <input type="password" id="sync-id-input" placeholder="あなた専用の同期ID" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-4 focus:outline-none focus:border-teal-400 text-white text-center tracking-widest text-lg">
                        <p id="login-error-msg" class="text-[10px] text-red-400 hidden text-left"></p>
                        <button onclick="loginWithSyncId()" class="w-full btn-primary py-4 rounded-xl font-bold text-slate-900 text-lg shadow-xl active:scale-95 transition-transform">同期を開始する</button>
                    </div>
                </div>
            </section>

            <!-- Loading Overlay -->
            <div id="loading" class="hidden fixed inset-0 bg-slate-900/90 z-50 flex flex-col items-center justify-center text-center p-6 backdrop-blur-sm">
                <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-teal-400 mb-6"></div>
                <p id="loading-status" class="text-teal-400 font-bold text-xl mb-2">処理中...</p>
                <p id="loading-sub" class="text-slate-400 text-sm">最高品質の教材を作成しています</p>
            </div>

            <!-- List View -->
            <section id="tab-list" class="hidden fade-in h-full overflow-y-auto pr-1">
                <div id="word-container" class="grid gap-6 pb-20"></div>
            </section>

            <!-- Add View -->
            <section id="tab-add" class="hidden fade-in">
                <div class="glass-card p-6">
                    <h2 class="text-xl font-bold mb-6">新しい単語を登録</h2>
                    <div class="space-y-6">
                        <div>
                            <label class="block text-sm text-slate-400 mb-2">英単語 / 英熟語</label>
                            <input type="text" id="input-word" placeholder="例: Stakeholder" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-4 focus:outline-none focus:border-teal-400 text-white text-lg">
                        </div>
                        <button id="add-submit-btn" onclick="processNewWord()" class="w-full btn-primary py-4 rounded-xl font-bold text-slate-900 text-lg shadow-xl active:scale-95 transition-all">AI教材を生成 & 保存</button>
                    </div>
                </div>
            </section>

            <!-- Test View -->
            <section id="tab-test" class="hidden fade-in flex-grow flex flex-col">
                <div class="glass-card p-6 text-center flex flex-col flex-grow min-h-[500px]">
                    <div class="flex justify-between items-center mb-6">
                        <span id="test-progress" class="text-xs text-slate-500 font-mono">1 / 5</span>
                        <button onclick="stopTest()" class="text-slate-500 hover:text-white p-2"><i class="fa-solid fa-xmark text-lg"></i></button>
                    </div>
                    <div id="test-jp-text" class="text-xl font-bold mb-8 min-h-[5rem] flex items-center justify-center leading-relaxed"></div>
                    <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden mb-8"><div id="test-timer-bar" class="timer-bar"></div></div>
                    <div id="test-answer-area" class="hidden fade-in pb-4">
                        <img id="test-image" src="" alt="" class="anime-image mb-4">
                        <div class="flex items-center justify-center gap-2 mb-1">
                            <p id="test-en-text" class="text-lg font-bold text-teal-400"></p>
                            <span id="test-pos" class="pos-badge"></span>
                        </div>
                        <button onclick="playSpeech('test-en-text')" class="audio-btn text-teal-400 text-3xl mt-2 active:scale-90 transition-transform"><i class="fa-solid fa-volume-high"></i></button>
                    </div>
                    <div class="mt-auto flex gap-4 pt-4"><button id="btn-show-answer" onclick="revealAnswer()" class="flex-grow btn-primary py-4 rounded-xl font-bold text-slate-900">答えを見る</button><button id="btn-next-test" onclick="nextQuestion()" class="hidden flex-grow btn-primary py-4 rounded-xl font-bold text-slate-900">次へ</button></div>
                </div>
            </section>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- 1. CONFIGURATION ---
        
        // 【重要】ここに「Gemini API Key」という名前のキーを貼ってください
        const geminiApiKey = "AIzaSyBM07NSZ9dJrlzNcSpHrCS6lI-39wwyHYo"; 
        
        // 【重要】apiKeyの部分に「Browser key (Firebase作成)」を貼ってください
        const firebaseConfig = {
            apiKey: "AIzaSyB7EQtiD4SLni8RgI63XtADxbEBRetfo1s",
            authDomain: "biz-english-app.firebaseapp.com",
            projectId: "biz-english-app",
            storageBucket: "biz-english-app.firebasestorage.app",
            messagingSenderId: "1096252459",
            appId: "1:1096252459:web:e003ec9aa9c40d63517e6e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appIdPrefix = "biz-eng-pro-v6";

        let words = [];
        let syncId = localStorage.getItem('biz_eng_sync_id_v6');
        let currentTestIndex = 0;
        let testQueue = [];
        let testTimer = null;
        let isSpeaking = false;
        let unsubscribeSync = null;

        // --- AUTH & SYNC ---
        window.loginWithSyncId = () => {
            const input = document.getElementById('sync-id-input').value.trim();
            if (input.length < 4) { alert("同期IDは4文字以上で入力してください。"); return; }
            syncId = input;
            localStorage.setItem('biz_eng_sync_id_v6', syncId);
            checkAuthState();
        };

        window.logout = () => {
            if (confirm("ログアウトしますか？")) { localStorage.removeItem('biz_eng_sync_id_v6'); location.reload(); }
        };

        const checkAuthState = async () => {
            if (!syncId) { switchTab('login'); return; }
            showLoading(true, "Firebaseに接続中...");
            try {
                await signInAnonymously(auth);
                setupSync();
                document.getElementById('header').classList.remove('hidden');
                switchTab('list'); 
            } catch (err) { 
                document.getElementById('login-error-msg').innerText = `エラー: ${err.code}. 承認済みドメインを確認してください。`;
                document.getElementById('login-error-msg').classList.remove('hidden');
                showLoading(false);
            }
        };

        const setupSync = () => {
            if (!syncId) return;
            const wordsCol = collection(db, 'artifacts', appIdPrefix, 'users', syncId, 'words');
            if (unsubscribeSync) unsubscribeSync();
            unsubscribeSync = onSnapshot(wordsCol, (snapshot) => {
                const fetched = [];
                snapshot.forEach(doc => fetched.push({ id: doc.id, ...doc.data() }));
                words = fetched.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
                renderWordList();
                document.getElementById('sync-status').innerText = `ID: ${syncId.substring(0,3)}***`;
                showLoading(false);
            });
        };

        // --- AI LOGIC (v1betaをベースに安定化) ---
        async function callAi(url, body) {
            const res = await fetch(`${url}?key=${geminiApiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            if (!res.ok) {
                const errData = await res.json().catch(() => ({}));
                throw new Error(errData.error?.message || `HTTP ${res.status}`);
            }
            return await res.json();
        }

        window.processNewWord = async () => {
            const wordInput = document.getElementById('input-word').value.trim();
            if (!wordInput || !syncId) return;
            showLoading(true, "AIが単語を解析中...", "例文と品詞を生成しています");
            try {
                // v1beta エンドポイントを使用
                const textUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent`;
                const prompt = `分析対象のビジネス英単語: ${wordInput}\n必ず以下のJSON形式のみで出力してください。Markdown記法は不要です。\n{ "word": "${wordInput}", "part_of_speech": "品詞", "phonetic": "発音記号", "meaning": "意味", "examples": [{"en": "例文1", "jp": "和訳1"}, {"en": "例文2", "jp": "和訳2"}], "visual_description": "A high-quality business anime office scene showing [English description]" }`;
                
                const textData = await callAi(textUrl, { contents: [{ parts: [{ text: prompt }] }] });
                const rawText = textData.candidates[0].content.parts[0].text;
                const jsonStr = rawText.substring(rawText.indexOf('{'), rawText.lastIndexOf('}') + 1);
                const wordData = JSON.parse(jsonStr);

                showLoading(true, "イラストをデザイン中...", "記憶に残りやすい画像を生成しています");
                const imgUrl = `https://generativelanguage.googleapis.com/v1beta/models/imagen-3.0-generate-001:predict`;
                const imgData = await callAi(imgUrl, { 
                    instances: [{ prompt: `Modern professional corporate anime style, clean lines. ${wordData.visual_description}` }],
                    parameters: { sampleCount: 1 }
                });
                
                wordData.imageUrl = `data:image/png;base64,${imgData.predictions[0].bytesBase64Encoded}`;
                wordData.createdAt = Date.now();
                wordData.reviewCount = 0;

                await setDoc(doc(db, 'artifacts', appIdPrefix, 'users', syncId, 'words', `w_${Date.now()}`), wordData);
                switchTab('list');
                document.getElementById('input-word').value = '';
            } catch (e) { alert("生成に失敗しました。\n理由: " + e.message + "\n\n※GCPで『APIの制限なし』になっているか確認してください。"); }
            finally { showLoading(false); }
        };

        // --- UI & RENDER ---
        window.switchTab = (tabName) => {
            ['login', 'list', 'add', 'test'].forEach(id => document.getElementById(`tab-${id}`).classList.add('hidden'));
            document.getElementById(`tab-${tabName}`).classList.remove('hidden');
        };

        window.showLoading = (show, status = "", sub = "") => {
            const overlay = document.getElementById('loading');
            if (status) document.getElementById('loading-status').innerText = status;
            if (sub) document.getElementById('loading-sub').innerText = sub;
            overlay.classList.toggle('hidden', !show);
        };

        window.renderWordList = () => {
            const container = document.getElementById('word-container');
            if (words.length === 0) { container.innerHTML = `<div class="text-center py-20 text-slate-500">まだ単語がありません。<br>右上の「＋」から追加してください。</div>`; return; }
            container.innerHTML = words.map(w => `
                <div class="glass-card overflow-hidden fade-in mb-6">
                    <img src="${w.imageUrl}" class="w-full h-52 object-cover opacity-80" onerror="this.src='https://via.placeholder.com/400x200?text=Image+Load+Error'">
                    <div class="p-5 -mt-12 relative z-10">
                        <div class="bg-slate-900/95 rounded-2xl p-5 border border-white/10 shadow-2xl">
                            <div class="flex justify-between items-start mb-3">
                                <div>
                                    <div class="flex items-center gap-2 mb-1"><h3 class="text-2xl font-bold text-teal-400">${w.word}</h3><span class="pos-badge">${w.part_of_speech}</span></div>
                                    <p class="text-xs font-mono text-slate-500">${w.phonetic} | <i class="fa-solid fa-rotate-right"></i> ${w.reviewCount}回</p>
                                </div>
                                <button onclick="playText('${w.word.replace(/'/g, "\\'")}')" class="audio-btn text-teal-400 p-2 hover:bg-teal-400/10 rounded-full"><i class="fa-solid fa-volume-high text-xl"></i></button>
                            </div>
                            <p class="text-white font-bold mb-4 border-b border-slate-700 pb-2">${w.meaning}</p>
                            ${w.examples.map(ex => `<div class="bg-slate-800/50 p-3 rounded-xl border-l-4 border-teal-400 mb-2">
                                <div class="flex justify-between"><p class="text-xs text-teal-50 font-medium leading-relaxed flex-grow">${ex.en}</p><button onclick="playText(\`${ex.en.replace(/'/g, "\\'")}\`)" class="text-slate-500 pl-2"><i class="fa-solid fa-play text-[10px]"></i></button></div>
                                <p class="text-[10px] text-slate-400 mt-1">💡 ${ex.jp}</p>
                            </div>`).join('')}
                        </div>
                    </div>
                </div>
            `).join('');
        };

        // --- TEST & AUDIO ---
        window.startTest = () => {
            if (words.length === 0) return;
            testQueue = [...words].sort(() => 0.5 - Math.random()).slice(0, 5).map(w => ({ ...w, targetEx: w.examples[Math.floor(Math.random()*w.examples.length)] }));
            currentTestIndex = 0; switchTab('test'); showQuestion();
        };
        window.stopTest = () => { clearTimeout(testTimer); switchTab('list'); };
        function showQuestion() {
            const q = testQueue[currentTestIndex];
            document.getElementById('test-progress').innerText = `${currentTestIndex+1} / ${testQueue.length}`;
            document.getElementById('test-jp-text').innerText = q.targetEx.jp;
            document.getElementById('test-en-text').innerText = q.targetEx.en;
            document.getElementById('test-image').src = q.imageUrl;
            document.getElementById('test-pos').innerText = q.part_of_speech;
            document.getElementById('test-answer-area').classList.add('hidden');
            document.getElementById('btn-show-answer').classList.remove('hidden');
            document.getElementById('btn-next-test').classList.add('hidden');
            const bar = document.getElementById('test-timer-bar');
            bar.style.transition = 'none'; bar.style.width = '100%';
            setTimeout(() => { bar.style.transition = 'width 10s linear'; bar.style.width = '0%'; }, 50);
            clearTimeout(testTimer); testTimer = setTimeout(revealAnswer, 10000);
        }
        window.revealAnswer = async () => {
            clearTimeout(testTimer);
            const q = testQueue[currentTestIndex];
            try { await updateDoc(doc(db, 'artifacts', appIdPrefix, 'users', syncId, 'words', q.id), { reviewCount: (q.reviewCount || 0) + 1 }); } catch (e) {}
            document.getElementById('test-answer-area').classList.remove('hidden');
            document.getElementById('btn-show-answer').classList.add('hidden');
            document.getElementById('btn-next-test').classList.remove('hidden');
            playText(q.targetEx.en);
        };
        window.nextQuestion = () => { currentTestIndex++; if (currentTestIndex < 5 && currentTestIndex < words.length) showQuestion(); else switchTab('list'); };
        window.playText = async (txt) => {
            if (isSpeaking) return; isSpeaking = true;
            try {
                const data = await callAi(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-preview-tts:generateContent`, {
                    contents: [{ parts: [{ text: txt }] }],
                    generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Puck" } } } }
                });
                const pcm = data.candidates[0].content.parts[0].inlineData.data;
                const audio = new Audio(URL.createObjectURL(new Blob([createWavHeader(atob(pcm).length, 24000), new Uint8Array([...atob(pcm)].map(c => c.charCodeAt(0)))], { type: 'audio/wav' })));
                audio.onended = () => isSpeaking = false; audio.play();
            } catch (e) { isSpeaking = false; }
        };
        window.playSpeech = (id) => playText(document.getElementById(id).innerText);
        function createWavHeader(l, r) {
            const b = new ArrayBuffer(44); const v = new DataView(b);
            const s = (o, str) => { for (let i = 0; i < str.length; i++) v.setUint8(o + i, str.charCodeAt(i)); };
            s(0, 'RIFF'); v.setUint32(4, 36 + l, true); s(8, 'WAVE'); s(12, 'fmt ');
            v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, 1, true);
            v.setUint32(24, r, true); v.setUint32(28, r * 2, true);
            v.setUint16(32, 2, true); v.setUint16(34, 16, true); s(36, 'data'); v.setUint32(40, l, true);
            return b;
        }
        window.onload = () => { checkAuthState(); };
    </script>
</body>
</html>
